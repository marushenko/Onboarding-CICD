name: 'Push to Redocly'

on:
  push:
    branches:
      - '**'

jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: 'Push files and wait for deployment'
        uses: redocly/reunite-push-action@v1
        with:
          organization: 'testing_redocly'
          defaultBranch: 'main'
          project: 'onboarding-yurii'
          mountPath: '/products/apiHub/CICD'
          files: 'Get_started_with_the_Learning_API.md Learning_OpenApi.yaml'
          domain: 'https://app.cloud.redocly.com'
        env:
          REDOCLY_AUTHORIZATION: ${{ secrets.REDOCLY_AUTHORIZATION }}
